<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachers Evaluation - WRL SWEET</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="h-content">
        <div class="brand"><a href="index.html"><img src="logo.PNG" alt="Logo" class="logo-img"></a><h1 class="brand-name">WRL SWEET</h1></div>
        <button class="hamburger" id="hamburger">&#9776;</button>
        <nav class="nav-links" id="navLinks">
            <a href="index.html">Home</a><a href="courses.html">Courses</a><a href="dashboard.html">Dashboard</a><a href="about.html">About Us</a><a href="contact.html">Contact Us</a>
        </nav>
        <div class="user-profile"><a href="profile.html"><img src="girl.png" alt="Profile" class="profile-img"></a></div>
    </div>
</header>

<main>
    <div class="main-wraper">
        <div class="full-width-banner">
            <img src="chefs.jpg" alt="chefs">
            <h1 class="main-title">Teachers Evaluation</h1>
        </div>

        <div class="main-wraper">
            <div class="notes-form" style="padding:20px;max-width:500px;margin:auto;">

                <label for="chefSelect" style="display:block;margin-bottom:6px;font-weight:bold;">Chef Name:</label>
                <select id="chefSelect" class="input-fild" style="width:100%;margin-bottom:14px;">
                    <option value="" disabled selected>Select a Chef</option>
                    <option value="Wjood">Wjood</option>
                    <option value="Rahaf">Rahaf</option>
                    <option value="Deemah">Deemah</option>
                    <option value="Lama">Lama</option>
                </select>

                <label style="display:block;margin-bottom:6px;font-weight:bold;">Rating:</label>
                <div class="star-rating" id="starRating" style="margin-bottom:14px;">
                    <span data-val="1">★</span>
                    <span data-val="2">★</span>
                    <span data-val="3">★</span>
                    <span data-val="4">★</span>
                    <span data-val="5">★</span>
                </div>
                <input type="hidden" id="ratingValue" value="0">

                <label for="feedback" style="display:block;margin-bottom:6px;font-weight:bold;">Feedback:</label>
                <textarea id="feedback" class="textarea-fild" placeholder="Write your feedback here..." style="width:100%;margin-bottom:14px;"></textarea>

                <button type="button" id="submitEval" class="save-btn">Save</button>
            </div>
        </div>
    </div>
</main>

<footer class="footer">
    <div class="f-content">
        <div class="footer-section left"><p class="about-site">If you like us, tell others. If not, tell us.</p><p class="copyright">&copy; 2026 WRL. All rights reserved.</p></div>
        <div class="footer-section center"><div class="contact-box"><h4>Contact Us</h4><p class="phone-number">+966 50 000 0000</p></div></div>
        <div class="footer-section right"><div class="social"><a href="https://www.instagram.com/wrl.sweet" target="_blank"><img src="instagram.png" alt="Instagram" class="social-icon"></a><a href="https://twitter.com/WRL_Sweet" target="_blank"><img src="x.png" alt="Twitter" class="social-icon"></a></div></div>
    </div>
</footer>

<script>
document.getElementById('hamburger').addEventListener('click',function(){document.getElementById('navLinks').classList.toggle('open');});
if(localStorage.getItem('wrl-theme')==='dark')document.body.classList.add('theme-dark');

// Star rating interaction
let selectedRating = 0;
const stars = document.querySelectorAll('#starRating span');

stars.forEach(function(star) {
    star.addEventListener('mouseover', function() {
        const val = parseInt(this.dataset.val);
        stars.forEach(s => s.classList.toggle('active', parseInt(s.dataset.val) <= val));
    });
    star.addEventListener('mouseleave', function() {
        stars.forEach(s => s.classList.toggle('active', parseInt(s.dataset.val) <= selectedRating));
    });
    star.addEventListener('click', function() {
        selectedRating = parseInt(this.dataset.val);
        document.getElementById('ratingValue').value = selectedRating;
        stars.forEach(s => s.classList.toggle('active', parseInt(s.dataset.val) <= selectedRating));
    });
});

// Validation & submit
document.getElementById('submitEval').addEventListener('click', function() {
    const chef = document.getElementById('chefSelect').value;
    const rating = parseInt(document.getElementById('ratingValue').value);
    const feedback = document.getElementById('feedback').value.trim();

    let errors = [];
    const chefSel = document.getElementById('chefSelect');
    const feedbackEl = document.getElementById('feedback');
    chefSel.style.border = '';
    feedbackEl.style.border = '';

    if (!chef) {
        chefSel.style.border = '2px solid red';
        errors.push('Please select a teacher.');
    }
    if (!rating || rating === 0) {
        document.getElementById('starRating').style.outline = '2px solid red';
        errors.push('Please add a rating.');
    } else {
        document.getElementById('starRating').style.outline = '';
    }
    if (!feedback) {
        feedbackEl.style.border = '2px solid red';
        errors.push('Please write your feedback.');
    }

    if (errors.length > 0) {
        alert('Please fix the following:\n• ' + errors.join('\n• '));
        return;
    }

    if (rating >= 3) {
        alert('Thank you for your positive review of Chef ' + chef + '! 🌟 We appreciate your kind words.');
    } else {
        alert('We apologize that your experience with Chef ' + chef + ' did not meet your expectations. We will work to improve. 🙏');
    }

    // Redirect to dashboard
    window.location.href = 'dashboard.html';
});
</script>

</body>
</html>
