<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result - WRL SWEET</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="h-content">
        <div class="brand"><a href="index.html"><img src="logo.PNG" alt="Logo" class="logo-img"></a><h1 class="brand-name">WRL SWEET</h1></div>
        <button class="hamburger" id="hamburger">&#9776;</button>
        <nav class="nav-links" id="navLinks">
            <a href="index.html">Home</a><a href="courses.html">Courses</a><a href="dashboard.html">Dashboard</a><a href="about.html">About Us</a><a href="contact.html">Contact Us</a>
        </nav>
        <div class="user-profile"><a href="profile.html"><img src="girl.png" alt="Profile" class="profile-img"></a></div>
    </div>
</header>

<main>
    <div class="result-container">
        <h2>Results</h2>
        <p class="excellent" id="resultMsg"></p>
        <div class="scores-box">
            <p class="score">Quiz: <strong id="quizName"></strong></p>
            <p class="score">Your Score: <strong id="currentScore"></strong></p>
            <p class="best-score">🏆 Best Score: <strong id="bestScore"></strong></p>
        </div>
        <div class="result-actions">
            <a href="dashboard.html" class="btn">Dashboard</a>
        </div>
    </div>
</main>

<footer class="footer">
    <div class="f-content">
        <div class="footer-section left"><p class="about-site">If you like us, tell others. If not, tell us.</p><p class="copyright">&copy; 2026 WRL. All rights reserved.</p></div>
        <div class="footer-section center"><div class="contact-box"><h4>Contact Us</h4><p class="phone-number">+966 50 000 0000</p></div></div>
        <div class="footer-section right"><div class="social"><a href="https://www.instagram.com/wrl.sweet" target="_blank"><img src="instagram.png" alt="Instagram" class="social-icon"></a><a href="https://twitter.com/WRL_Sweet" target="_blank"><img src="x.png" alt="Twitter" class="social-icon"></a></div></div>
    </div>
</footer>

<script>
document.getElementById('hamburger').addEventListener('click',function(){document.getElementById('navLinks').classList.toggle('open');});
if(localStorage.getItem('wrl-theme')==='dark')document.body.classList.add('theme-dark');

// Retrieve result from localStorage
const score = parseInt(localStorage.getItem('current_score') || '0');
const total = parseInt(localStorage.getItem('current_total') || '4');
const quizName = localStorage.getItem('current_quiz_name') || 'Quiz';
const quizKey = localStorage.getItem('current_quiz_key') || '';
const bestScore = parseInt(localStorage.getItem(quizKey) || score);

document.getElementById('quizName').textContent = quizName;
document.getElementById('currentScore').textContent = score + ' / ' + total;
document.getElementById('bestScore').textContent = bestScore + ' / ' + total;

const pct = score / total;
let msg = '';
if (pct === 1) msg = '🌟 Perfect Score! Outstanding work!';
else if (pct >= 0.75) msg = '🎉 Excellent work! Keep it up!';
else if (pct >= 0.5) msg = '👍 Good job! Review the lesson to improve.';
else msg = '📚 Keep studying! You can do better next time.';
document.getElementById('resultMsg').textContent = msg;
</script>

</body>
</html>
