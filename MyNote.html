<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes - WRL SWEET</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="h-content">
        <div class="brand"><a href="index.html"><img src="logo.PNG" alt="Logo" class="logo-img"></a><h1 class="brand-name">WRL SWEET</h1></div>
        <button class="hamburger" id="hamburger">&#9776;</button>
        <nav class="nav-links" id="navLinks">
            <a href="index.html">Home</a><a href="courses.html">Courses</a><a href="dashboard.html">Dashboard</a><a href="about.html">About Us</a><a href="contact.html">Contact Us</a>
        </nav>
        <div class="user-profile"><a href="profile.html"><img src="girl.png" alt="Profile" class="profile-img"></a></div>
    </div>
</header>

<main>
<div class="notes-page">

    <!-- ── DELETE FORM ── -->
    <section class="your-notes-section">
        <h3>Your Notes</h3>
        <form id="deleteForm">
            <div id="notesList">
                <!-- Dynamically rendered -->
            </div>
            <div class="delete-actions">
                <button type="button" class="btn" id="deleteSelectedBtn">Remove Selected</button>
                <button type="button" class="btn" id="deleteAllBtn">Remove All</button>
            </div>
        </form>
    </section>

    <!-- ── ADD FORM ── -->
    <section class="add-note-section">
        <h3>Add Note</h3>
        <form id="addNoteForm">
            <div class="note-card">
                <div class="image-placeholder">
                    <img src="BookNote.jpg" class="image-placeholder" alt="Note">
                </div>
                <div class="note-inputs">
                    <input type="text" id="noteTitle" placeholder="Note Title ..." class="input-field title-input">
                    <input type="text" id="noteDesc" placeholder="Your details (min 30 characters) ..." class="input-field text-input">
                    <select id="notePriority" class="priority-dropdown">
                        <option value="" disabled selected>Select Priority</option>
                        <option value="1">1 — High (Red)</option>
                        <option value="2">2 — Medium (Yellow)</option>
                        <option value="3">3 — Low (Green)</option>
                    </select>
                </div>
                <div class="note-actions">
                    <button type="button" class="btn" id="addNoteBtn">Add</button>
                    <button type="button" class="btn save-btn" id="saveNoteBtn">Save</button>
                </div>
            </div>
        </form>
    </section>

</div>
</main>

<footer class="footer">
    <div class="f-content">
        <div class="footer-section left"><p class="about-site">If you like us, tell others. If not, tell us.</p><p class="copyright">&copy; 2026 WRL. All rights reserved.</p></div>
        <div class="footer-section center"><div class="contact-box"><h4>Contact Us</h4><p class="phone-number">+966 50 000 0000</p></div></div>
        <div class="footer-section right"><div class="social"><a href="https://www.instagram.com/wrl.sweet" target="_blank"><img src="instagram.png" alt="Instagram" class="social-icon"></a><a href="https://twitter.com/WRL_Sweet" target="_blank"><img src="x.png" alt="Twitter" class="social-icon"></a></div></div>
    </div>
</footer>

<script>
document.getElementById('hamburger').addEventListener('click',function(){document.getElementById('navLinks').classList.toggle('open');});
if(localStorage.getItem('wrl-theme')==='dark')document.body.classList.add('theme-dark');

// Load notes from localStorage
let notes = JSON.parse(localStorage.getItem('wrl_notes') || '[]');

function renderNotes() {
    const container = document.getElementById('notesList');
    if (notes.length === 0) {
        container.innerHTML = '<p style="color:#888;text-align:center;padding:16px;">No notes yet. Add one above!</p>';
        return;
    }
    container.innerHTML = notes.map((n, i) => `
        <div class="note-card saved-note note-priority-${n.priority}" data-index="${i}">
            <div class="image-placeholder"><img src="BookNote.jpg" class="image-placeholder" alt="Note"></div>
            <div class="note-content">
                <span class="display-name"><strong>${n.title}</strong></span>
                <span class="display-stars">${n.desc}</span>
                <small>Priority: ${n.priority}</small>
            </div>
            <input type="checkbox" class="note-checkbox" data-index="${i}">
        </div>
    `).join('');
}

renderNotes();

function getFormValues() {
    return {
        title: document.getElementById('noteTitle').value.trim(),
        desc: document.getElementById('noteDesc').value.trim(),
        priority: document.getElementById('notePriority').value
    };
}

function validateNote(n) {
    if (!n.desc || n.desc.length < 30) {
        alert('Note description is too short! Please write at least 30 characters.');
        return false;
    }
    if (!n.priority) {
        alert('Please select a priority for the note.');
        return false;
    }
    return true;
}

function clearForm() {
    document.getElementById('noteTitle').value = '';
    document.getElementById('noteDesc').value = '';
    document.getElementById('notePriority').value = '';
}

// Add (no localStorage save)
document.getElementById('addNoteBtn').addEventListener('click', function() {
    const n = getFormValues();
    if (!validateNote(n)) return;
    notes.push(n);
    renderNotes();
    clearForm();
});

// Save (with localStorage)
document.getElementById('saveNoteBtn').addEventListener('click', function() {
    const n = getFormValues();
    if (!validateNote(n)) return;
    notes.push(n);
    localStorage.setItem('wrl_notes', JSON.stringify(notes));
    renderNotes();
    clearForm();
});

// Delete selected
document.getElementById('deleteSelectedBtn').addEventListener('click', function() {
    const checked = document.querySelectorAll('.note-checkbox:checked');
    if (checked.length === 0) {
        alert('Please select at least one note.');
        return;
    }
    if (!confirm('Are you sure you want to delete the selected notes?')) return;
    const toDelete = Array.from(checked).map(cb => parseInt(cb.dataset.index));
    notes = notes.filter((_, i) => !toDelete.includes(i));
    localStorage.setItem('wrl_notes', JSON.stringify(notes));
    renderNotes();
});

// Delete all
document.getElementById('deleteAllBtn').addEventListener('click', function() {
    if (notes.length === 0) { alert('No notes to delete.'); return; }
    if (!confirm('Are you sure you want to delete ALL notes?')) return;
    notes = [];
    localStorage.setItem('wrl_notes', JSON.stringify(notes));
    renderNotes();
});
</script>

</body>
</html>
